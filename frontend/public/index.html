<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="Sahay — Connecting communities with relief, volunteers, and resources."
    />

    <!-- Favicon: inline SVG as data URI -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='20' font-weight='bold' fill='%23e8c547'>S</text></svg>"
    />

    <!-- Apple touch icon -->
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230a0a0a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='120' font-weight='bold' fill='%23e8c547'>S</text></svg>"
    />

    <!-- Google Fonts — same families used in index.css -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS (react-leaflet peer dep) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <title>Sahay — Community Relief Platform</title>

    <style>
      /* Critical above-the-fold styles to prevent flash */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #f0ede8;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* App loading spinner shown before React hydrates */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
      }

      /* Minimal splash while JS loads */
      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
        font-family: 'Syne', sans-serif;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash-logo {
        font-size: 40px;
        font-weight: 800;
        color: #f0ede8;
        letter-spacing: -1px;
        margin-bottom: 8px;
      }

      #splash-logo span { color: #e8c547; }

      #splash-tag {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #5a5754;
        margin-bottom: 32px;
      }

      #splash-ring {
        width: 24px;
        height: 24px;
        border: 2px solid #2a2a2a;
        border-top-color: #e8c547;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <noscript>
      <div style="
        display:flex; align-items:center; justify-content:center;
        min-height:100vh; background:#0a0a0a; color:#9a9690;
        font-family:sans-serif; text-align:center; padding:20px;
      ">
        <div>
          <p style="font-size:24px; color:#f0ede8; margin-bottom:8px;">Sahay</p>
          <p>You need to enable JavaScript to run this application.</p>
        </div>
      </div>
    </noscript>

    <!-- Splash screen — hidden once React mounts -->
    <div id="splash">
      <div id="splash-logo">Sahay<span>.</span></div>
      <div id="splash-tag">Community Relief Platform</div>
      <div id="splash-ring"></div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <script>
      // Hide splash once React has rendered something into #root
      (function () {
        var splash = document.getElementById('splash');
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function () { splash.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      })();
    </script>
  </body>
</html>
